# Docker Compose stack for the multi-tool research agent REST API.
#
# Quickstart:
#   docker compose up --build           # build & run in foreground
#   docker compose up -d                # detached
#   docker compose logs -f api          # tail logs
#   docker compose down                 # stop & remove
#   curl http://localhost:8000/health   # smoke test
#
# Persistent state (SQLite checkpoints, chart PNGs, metrics JSONL) is
# bind-mounted from the host so it survives `docker compose down`.

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: multi-tool-research-agent:latest
    container_name: research-agent-api
    ports:
      - "8000:8000"
    # Reads ANTHROPIC_API_KEY (and optional WOLFRAM_ALPHA_APP_ID,
    # OPENWEATHER_API_KEY, TAVILY_API_KEY) from the host .env file —
    # the same file the CLI and Streamlit UI already use.
    env_file:
      - .env
    # Bind-mount persistent state. The container's app user runs as
    # UID 1000; if your host user is on a different UID, chown the
    # directories before bringing the stack up.
    volumes:
      - ./sessions:/app/sessions
      - ./output:/app/output
      - ./observability:/app/observability
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request, sys; sys.exit(0) if urllib.request.urlopen('http://localhost:8000/health', timeout=3).status == 200 else sys.exit(1)"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
