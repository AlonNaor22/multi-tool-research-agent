name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

# Cancel earlier workflow runs on the same branch when a new push arrives —
# the latest commit is what matters; stale jobs just burn minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest (ubuntu-latest, Python 3.12)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run test suite
        # pytest.ini already configures -n auto + --tb=short, so this is just
        # the entry point. -q keeps the GitHub Actions log readable.
        run: pytest -q
        env:
          # The suite doesn't need real API keys — tools and the agent are
          # mocked or use stub-agent fixtures — but agent.py reads env at
          # import time, so set a placeholder to avoid any None-handling
          # edge case from leaking into a test.
          ANTHROPIC_API_KEY: ci-placeholder-not-used

  docker-build:
    name: docker build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        # Validates the Dockerfile + .dockerignore stay correct as the codebase
        # evolves. cache-from/to share layers between runs via the GitHub
        # Actions cache backend so subsequent builds finish in ~30s.
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: multi-tool-research-agent:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke-check the image can import the FastAPI app
        # The container can't fully start (no ANTHROPIC_API_KEY → ChatAnthropic
        # would refuse a real call), but importing src.api.app proves all the
        # production deps are installed correctly inside the image.
        run: |
          docker run --rm \
            -e ANTHROPIC_API_KEY=ci-placeholder \
            multi-tool-research-agent:ci \
            python -c "from src.api.app import create_app; create_app(); print('app imports OK')"
